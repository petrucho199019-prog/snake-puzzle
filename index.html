<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worms GO! — Изгибающаяся змейка (Canvas)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef7e8; 
            color: #2c3e50;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        h1 { margin: 0 0 5px 0; font-size: 26px; color: #27ae60; }
        p { margin-bottom: 20px; color: #555; font-weight: bold; }

        /* Контейнер для Canvas */
        #game-container {
            background: #d4e6c9;
            padding: 10px;
            border-radius: 20px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        canvas {
            background: rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            display: block;
        }

        .btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 0 #1e7e43;
            margin-top: 20px;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1e7e43;
        }
    </style>
</head>
<body>

    <h1>Worms GO! 🐍</h1>
    <p>Кликни по полю, чтобы змейка уползла!</p>
    
    <div id="game-container">
        <!-- Наш игровой холст -->
        <canvas id="gameCanvas" width="360" height="360"></canvas>
    </div>

    <button class="btn" onclick="resetWorm()">Вернуть змейку</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const CELL_SIZE = 60; // Размер одной клетки сетки
        const OFFSET = CELL_SIZE / 2; // Центр клетки для отрисовки линии

        // Полный путь, по которому будет ползти змейка (в координатах сетки)
        // Она стартует свернутой буквой "S", а потом ползет направо за край экрана
        const escapePath = [
            {x: 1, y: 4}, // 0: Хвост
            {x: 2, y: 4}, // 1: Изгиб
            {x: 2, y: 3}, // 2: Изгиб
            {x: 3, y: 3}, // 3: Изгиб
            {x: 3, y: 2}, // 4: Изгиб
            {x: 4, y: 2}, // 5: Голова (в начале)
            // Дальше — путь к спасению
            {x: 4, y: 1}, 
            {x: 5, y: 1},
            {x: 6, y: 1}, 
            {x: 7, y: 1},
            {x: 8, y: 1}  // За пределы экрана
        ];

        let tailIndex = 0;
        let headIndex = 5; // Змейка занимает точки от 0 до 5
        let progress = 0;  // Прогресс движения от одной точки к другой (от 0.0 до 1.0)
        let isMoving = false;
        let animationFrameId;

        // Отрисовка всей графики (60 кадров в секунду)
        function render() {
            // Очищаем холст
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Рисуем сетку (для наглядности)
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.lineWidth = 2;
            for(let i=0; i<=6; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0); ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.moveTo(0, i * CELL_SIZE); ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // Массив точек, которые мы будем соединять линией в текущем кадре
            let drawPoints = [];

            // Высчитываем плавное перетекание хвоста
            if (tailIndex < escapePath.length - 1) {
                let pT = escapePath[tailIndex];
                let pT1 = escapePath[tailIndex + 1];
                drawPoints.push({
                    x: pT.x + (pT1.x - pT.x) * progress,
                    y: pT.y + (pT1.y - pT.y) * progress
                });
            }

            // Добавляем все неподвижные точки туловища (углы)
            for (let i = tailIndex + 1; i <= headIndex; i++) {
                if (i < escapePath.length) drawPoints.push(escapePath[i]);
            }

            // Высчитываем плавное перетекание головы
            if (isMoving && headIndex < escapePath.length - 1) {
                let pH = escapePath[headIndex];
                let pH1 = escapePath[headIndex + 1];
                drawPoints.push({
                    x: pH.x + (pH1.x - pH.x) * progress,
                    y: pH.y + (pH1.y - pH.y) * progress
                });
            }

            // 2. Рисуем саму змейку
            if (drawPoints.length > 1) {
                ctx.beginPath();
                // Настраиваем кисть: толстая, с круглыми концами и круглыми изгибами
                ctx.lineWidth = 36;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#4caf50'; // Зеленый цвет

                // Соединяем точки
                ctx.moveTo(drawPoints[0].x * CELL_SIZE + OFFSET, drawPoints[0].y * CELL_SIZE + OFFSET);
                for(let i = 1; i < drawPoints.length; i++) {
                    ctx.lineTo(drawPoints[i].x * CELL_SIZE + OFFSET, drawPoints[i].y * CELL_SIZE + OFFSET);
                }
                ctx.stroke();

                // 3. Рисуем глазки на голове
                const head = drawPoints[drawPoints.length - 1];
                const prev = drawPoints[drawPoints.length - 2];
                
                // Вычисляем угол поворота головы, чтобы глаза смотрели вперед
                const angle = Math.atan2(head.y - prev.y, head.x - prev.x);
                
                ctx.save();
                ctx.translate(head.x * CELL_SIZE + OFFSET, head.y * CELL_SIZE + OFFSET);
                ctx.rotate(angle);
                
                // Левый глаз
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(5, -7, 5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath(); ctx.arc(7, -7, 2, 0, Math.PI * 2); ctx.fill();
                
                // Правый глаз
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(5, 7, 5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath(); ctx.arc(7, 7, 2, 0, Math.PI * 2); ctx.fill();
                
                ctx.restore();
            }

            // 4. Логика движения (анимация)
            if (isMoving) {
                progress += 0.08; // Скорость ползания
                
                // Когда проползли ровно одну клетку
                if (progress >= 1.0) {
                    progress = 0;
                    tailIndex++;
                    headIndex++;
                    
                    // Если голова достигла конца пути — останавливаемся
                    if (headIndex >= escapePath.length - 1) {
                        isMoving = false;
                    }
                }
            }

            // Запускаем следующий кадр, если змейка не уползла до конца
            if (tailIndex < escapePath.length - 1) {
                animationFrameId = requestAnimationFrame(render);
            }
        }

        // Запуск движения по клику
        canvas.addEventListener('click', () => {
            if (!isMoving && headIndex < escapePath.length - 1) {
                isMoving = true;
            }
        });

        // Сброс сцены
        function resetWorm() {
            cancelAnimationFrame(animationFrameId);
            tailIndex = 0;
            headIndex = 5;
            progress = 0;
            isMoving = false;
            render();
        }

        // Отрисовать первый кадр при загрузке
        render();
    </script>
</body>
</html>
